{% extends "base.html" %}


{% block breadcrumbs %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb mb-0">
    <li class="breadcrumb-item"><a href="/">Home</a></li>
    <li class="breadcrumb-item"><a href="{% url 'login' %}">Login</a></li>
    <li class="breadcrumb-item active" aria-current="page">{{ title }}</li>
  </ol>
</nav>
{% endblock %}


{% block main %}
<div class="container my-5">
  <div class="row">
    <div class="col-lg-6 offset-lg-3 col-md-8 offset-md-2">
      <div class="section-label mb-2">account · recovery</div>
      <h1 class="fw-bolder text-white" style="letter-spacing: -0.01em;">{{ title }}</h1>
      <div class="alert alert-success py-2 small">Your password has been set. You can log in now.</div>
      <a href="{{ login_url }}" class="btn btn-primary">Login →</a>
    </div>
  </div>
</div>
{% endblock %}
