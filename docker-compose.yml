services:
  web:
    container_name: analytics_web
    build: .
    env_file: .env
    volumes:
      - /srv/data/analytics/:/data/
    ports:
      - "127.0.0.1:${PORT}:${PORT}"
    command: >
      sh -c "python manage.py refresh_geoip;
      exec gunicorn analytics.asgi:application --preload --workers 2 --max-requests 256
      --timeout 30 --bind :${PORT} --worker-class uvicorn.workers.UvicornWorker
      --error-logfile - --access-logfile -"
    restart: unless-stopped
